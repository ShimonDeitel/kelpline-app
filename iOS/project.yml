name: Kelp Line
options:
  bundleIdPrefix: com.shimondeitel.kelpline
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  KelpLine:
    type: application
    platform: iOS
    sources:
      - path: KelpLine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kelpline
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: KelpLine/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  KelpLineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KelpLineTests
      - path: KelpLine.storekit
    dependencies:
      - target: KelpLine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kelpline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  KelpLineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KelpLineUITests
    dependencies:
      - target: KelpLine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kelpline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  KelpLine:
    build:
      targets:
        KelpLine: all
        KelpLineTests: [test]
        KelpLineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: KelpLine.storekit
    test:
      config: Debug
      storeKitConfiguration: KelpLine.storekit
      targets:
        - KelpLineTests
        - KelpLineUITests
    archive:
      config: Release
